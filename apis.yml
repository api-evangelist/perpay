      - type: RateLimits
        url: rate-limits/perpay-rate-limits.yml
      - type: FinOps
        url: finops/perpay-finops.yml
  - name: Perpay Payroll Direct-Deposit API
    description: >-
      REST integration layer built on Pinwheel's payroll connectivity API.
      Supports direct-deposit switching, income and employment verification,
      and real-time confirmation of paycheck routing updates for 1.5 M+
      employer payroll platforms.
    humanURL: https://help.perpay.com/en/articles/11661160-how-perpay-uses-direct-deposit-for-payments
    baseURL: https://api.perpay.com
    tags:
      - Payroll
      - Direct Deposit
      - Income Verification
      - Employment Verification
      - Pinwheel
    properties:
      - type: Documentation
        url: https://help.perpay.com/en/articles/11661160-how-perpay-uses-direct-deposit-for-payments
  - name: Perpay Credit Reporting API
    description: >-
      Internal API that submits on-time payment history and spending-limit
      data to Experian, TransUnion, and Equifax for credit-building
      purposes. Governed by FCRA requirements.
    humanURL: https://help.perpay.com/en/articles/450206-how-perpay-works
    baseURL: https://api.perpay.com
    tags:
