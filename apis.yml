aid: perpay
url: https://raw.githubusercontent.com/api-evangelist/perpay/refs/heads/main/apis.yml
name: Perpay
kind: company
description: >-
  Perpay is a buy-now-pay-later and credit-building platform that lets consumers
  shop and pay via automatic payroll deductions. Its internal REST platform
  supports marketplace checkout, installment plan creation, payroll direct-deposit
  switching (via Pinwheel), identity and income verification, and credit-bureau
  reporting to Experian, TransUnion, and Equifax. Perpay operates a closed
  marketplace — third-party merchant checkout integration is not publicly available;
  API access is reserved for Perpay's own products and vetted partners.
