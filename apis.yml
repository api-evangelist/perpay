apis:
  - name: Perpay Marketplace Checkout API
    description: >-
      Internal REST API that powers checkout on the Perpay Marketplace.
      Handles product ordering, spending-limit enforcement, and installment
      plan creation for approved consumers. Access is limited to Perpay's
      own platform.
    humanURL: https://www.perpay.com
    baseURL: https://api.perpay.com
    tags:
